name: Build APKs (User + Admin)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  NODE_VERSION: '22'
  JAVA_VERSION: '21'
  JDK_DISTRIBUTION: 'temurin'

jobs:
  build-user-apk:
    name: Build User App APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Java (JDK 21 for Capacitor 8)
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JDK_DISTRIBUTION }}

      - name: Install npm dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Next.js static export
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload User APK
        uses: actions/upload-artifact@v4
        with:
          name: user-app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

  build-admin-apk:
    name: Build Admin App APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: south-admin

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: south-admin/package-lock.json

      - name: Setup Java (JDK 21 for Capacitor 8)
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JDK_DISTRIBUTION }}

      - name: Install npm dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Next.js static export
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build Debug APK
        working-directory: south-admin/android
        run: ./gradlew assembleDebug

      - name: Upload Admin APK
        uses: actions/upload-artifact@v4
        with:
          name: admin-app-debug
          path: south-admin/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

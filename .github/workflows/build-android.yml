      - name: Extract SHA fingerprints
        id: sha-dev
        run: |
          echo "╔══════════════════════════════════════════════╗"
          echo "║  DEV APP - SHA FINGERPRINTS                  ║"
          echo "║  Package: com.qtbm.south.dev                 ║"
          echo "╚══════════════════════════════════════════════╝"
          echo ""
          echo "--- Release Keystore (south-wallet.keystore) ---"
          keytool -list -v -keystore ${{ env.KEYSTORE_FILE }} -storepass ${{ env.KEYSTORE_PASSWORD }} -alias ${{ env.KEY_ALIAS }} 2>&1 | grep -E "SHA1:|SHA256:" || true
          echo ""
          echo "--- APK Signing Certificate ---"
          $ANDROID_HOME/build-tools/${{ env.ANDROID_BUILD_TOOLS }}/apksigner verify --print-certs south-dev/android/app/build/outputs/apk/release/app-release.apk 2>&1 || true
          echo ""
          # Extract SHA values for summary
          SHA1=$(keytool -list -v -keystore ${{ env.KEYSTORE_FILE }} -storepass ${{ env.KEYSTORE_PASSWORD }} -alias ${{ env.KEY_ALIAS }} 2>&1 | grep "SHA1:" | head -1 | awk '{print $2}')
          SHA256=$(keytool -list -v -keystore ${{ env.KEYSTORE_FILE }} -storepass ${{ env.KEYSTORE_PASSWORD }} -alias ${{ env.KEY_ALIAS }} 2>&1 | grep "SHA256:" | head -1 | awk '{print $2}')

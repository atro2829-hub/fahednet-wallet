        working-directory: south-dev
        run: npm install --legacy-peer-deps

      - name: Build Next.js static export
        working-directory: south-dev
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          NEXT_TELEMETRY_DISABLED: 1

      - name: Verify static export
        run: |
          echo "Checking south-dev/out/ directory..."
          ls -la south-dev/out/ | head -20
          echo "Total files in south-dev/out/:"
          find south-dev/out/ -type f | wc -l

      - name: Sync Capacitor Android
        working-directory: south-dev
        run: npx cap sync android

      - name: Verify Capacitor sync
        run: |
          echo "Checking south-dev/android/app/src/main/assets/public/..."
          ls -la south-dev/android/app/src/main/assets/public/ 2>/dev/null | head -10 || echo "⚠️ Public assets not found"
          echo "Checking google-services.json..."
          ls -la south-dev/android/app/google-services.json 2>/dev/null || echo "⚠️ google-services.json not found (optional for dev app)"

      - name: Build Release APK
        working-directory: south-dev/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -PMYAPP_UPLOAD_STORE_FILE=../../../${{ env.KEYSTORE_FILE }} \
            -PMYAPP_UPLOAD_STORE_PASSWORD=${{ env.KEYSTORE_PASSWORD }} \
            -PMYAPP_UPLOAD_KEY_ALIAS=${{ env.KEY_ALIAS }} \

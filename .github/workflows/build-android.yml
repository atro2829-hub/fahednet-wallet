          path: south-dev/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

  # ──────────────────────────────────────────────────────────────
  #  SHA FINGERPRINTS SUMMARY
  # ──────────────────────────────────────────────────────────────
  sha-fingerprints-summary:
    name: "🔑 SHA Fingerprints Summary"
    runs-on: ubuntu-latest
    needs: [build-user-app, build-admin-app, build-dev-app]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Extract and display all SHA fingerprints
        run: |
          echo "╔══════════════════════════════════════════════════════════╗"
          echo "║       SOUTH WALLET - ALL SHA FINGERPRINTS               ║"
          echo "╚══════════════════════════════════════════════════════════╝"
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  RELEASE KEYSTORE (south-wallet.keystore)"
          echo "  Used by ALL 3 apps (User + Admin + Dev)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          keytool -list -v -keystore south-wallet.keystore -storepass southwallet123 -alias southwallet 2>&1 | grep -E "SHA1:|SHA256:" || true
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  DEBUG KEYSTORE (auto-generated by Android SDK)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          keytool -genkeypair -v -keystore /tmp/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US" 2>/dev/null
          keytool -list -v -keystore /tmp/debug.keystore -storepass android -alias androiddebugkey 2>&1 | grep -E "SHA1:|SHA256:" || true
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  ADD THESE TO FIREBASE CONSOLE:"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "  App 1: com.qtbm.south         (User Wallet - محفظة الجنوب)"
          echo "  App 2: com.qtbm.south.admin    (Admin App - محفظة الجنوب الإدارة)"
          echo "  App 3: com.qtbm.south.dev      (Dev App - مركز النسخ)"
          echo ""
          echo "  All 3 apps use the SAME keystore → same SHA fingerprints"
          echo "  Add the Release SHA-1 and SHA-256 to ALL apps in Firebase"
          echo ""
          echo "  Steps:"
          echo "  1. Go to Firebase Console → Project Settings"
          echo "  2. Select each app (com.qtbm.south, com.qtbm.south.admin, com.qtbm.south.dev)"
          echo "  3. Click 'Add fingerprint'"
          echo "  4. Paste the SHA-1 and SHA-256 from the Release Keystore above"
          echo "  5. Re-download google-services.json for each app"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "Build Results:"
          echo "  User App:  ${{ needs.build-user-app.result }}"
          echo "  Admin App: ${{ needs.build-admin-app.result }}"
          echo "  Dev App:   ${{ needs.build-dev-app.result }}"

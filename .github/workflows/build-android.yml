      - name: Install npm dependencies
        working-directory: south-admin
        run: npm ci --legacy-peer-deps

      - name: Build Next.js static export
        working-directory: south-admin
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          NEXT_TELEMETRY_DISABLED: 1

      - name: Verify static export
        run: |
          echo "Checking south-admin/out/ directory..."
          ls -la south-admin/out/ | head -20
          echo "Total files in south-admin/out/:"
          find south-admin/out/ -type f | wc -l

      - name: Sync Capacitor Android
        working-directory: south-admin
        run: npx cap sync android

      - name: Verify Capacitor sync
        run: |
          echo "Checking south-admin/android/app/src/main/assets/public/..."
          ls -la south-admin/android/app/src/main/assets/public/ 2>/dev/null | head -10 || echo "⚠️ Public assets not found"
          echo "Checking google-services.json..."
          ls -la south-admin/android/app/google-services.json 2>/dev/null || echo "⚠️ google-services.json not found"

      - name: Build Release APK
        working-directory: south-admin/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -PMYAPP_UPLOAD_STORE_FILE=../../../${{ env.KEYSTORE_FILE }} \
            -PMYAPP_UPLOAD_STORE_PASSWORD=${{ env.KEYSTORE_PASSWORD }} \
            -PMYAPP_UPLOAD_KEY_ALIAS=${{ env.KEY_ALIAS }} \
            -PMYAPP_UPLOAD_KEY_PASSWORD=${{ env.KEY_PASSWORD }} \
            --stacktrace

      - name: Verify APK signing
        run: |
          APK_PATH="south-admin/android/app/build/outputs/apk/release/app-release.apk"
          echo "APK file info:"
          ls -la "$APK_PATH"
          echo ""
          echo "APK signing certificate:"
          $ANDROID_HOME/build-tools/${{ env.ANDROID_BUILD_TOOLS }}/apksigner verify --print-certs "$APK_PATH" 2>&1 || true

      - name: Extract SHA fingerprints
        id: sha-admin
        run: |
          echo "╔══════════════════════════════════════════════╗"
          echo "║  ADMIN APP - SHA FINGERPRINTS                ║"
          echo "║  Package: com.qtbm.south.admin               ║"
          echo "╚══════════════════════════════════════════════╝"
          echo ""
          echo "--- Release Keystore (south-wallet.keystore) ---"
          keytool -list -v -keystore ${{ env.KEYSTORE_FILE }} -storepass ${{ env.KEYSTORE_PASSWORD }} -alias ${{ env.KEY_ALIAS }} 2>&1 | grep -E "SHA1:|SHA256:" || true
          echo ""
          echo "--- APK Signing Certificate ---"
          $ANDROID_HOME/build-tools/${{ env.ANDROID_BUILD_TOOLS }}/apksigner verify --print-certs south-admin/android/app/build/outputs/apk/release/app-release.apk 2>&1 || true
          echo ""
          # Extract SHA values for summary
          SHA1=$(keytool -list -v -keystore ${{ env.KEYSTORE_FILE }} -storepass ${{ env.KEYSTORE_PASSWORD }} -alias ${{ env.KEY_ALIAS }} 2>&1 | grep "SHA1:" | head -1 | awk '{print $2}')
          SHA256=$(keytool -list -v -keystore ${{ env.KEYSTORE_FILE }} -storepass ${{ env.KEYSTORE_PASSWORD }} -alias ${{ env.KEY_ALIAS }} 2>&1 | grep "SHA256:" | head -1 | awk '{print $2}')
          echo "sha1=$SHA1" >> $GITHUB_OUTPUT
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          echo "Admin App SHA-1: $SHA1"
          echo "Admin App SHA-256: $SHA256"

      - name: Upload Admin App Release APK
        uses: actions/upload-artifact@v4
        with:
          name: south-wallet-admin-release
          path: south-admin/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

  # ──────────────────────────────────────────────────────────────
  #  DEV APP (com.qtbm.south.dev)
  # ──────────────────────────────────────────────────────────────
  build-dev-app:
    name: "🔧 Build Dev App (com.qtbm.south.dev)"
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.build_type == 'all' || github.event.inputs.build_type == 'dev' || github.event_name != 'workflow_dispatch' }}
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4

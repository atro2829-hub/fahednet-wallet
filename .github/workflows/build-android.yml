name: Build Android Apps

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Which apps to build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - user
          - admin
          - dev

env:
  NODE_VERSION: '22'
  JAVA_VERSION: '21'
  ANDROID_COMPILE_SDK: '36'
  ANDROID_BUILD_TOOLS: '36.0.0'
  KEYSTORE_FILE: 'south-wallet.keystore'
  KEYSTORE_PASSWORD: 'southwallet123'
  KEY_ALIAS: 'southwallet'
  KEY_PASSWORD: 'southwallet123'

jobs:
  # ──────────────────────────────────────────────────────────────
  #  USER WALLET (com.qtbm.south)
  # ──────────────────────────────────────────────────────────────
  build-user-app:
    name: "📱 Build User Wallet (com.qtbm.south)"
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.build_type == 'all' || github.event.inputs.build_type == 'user' || github.event_name != 'workflow_dispatch' }}
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK Licenses
        run: yes | sdkmanager --licenses 2>/dev/null || true

      - name: Install Android SDK components
        run: |
          sdkmanager --install "platforms;android-${{ env.ANDROID_COMPILE_SDK }}" "build-tools;${{ env.ANDROID_BUILD_TOOLS }}" || true
          sdkmanager --install "platform-tools" || true

      - name: Verify keystore exists
        run: |
          echo "Verifying keystore file..."
          ls -la ${{ env.KEYSTORE_FILE }}
          echo "Keystore certificate info:"
          keytool -list -keystore ${{ env.KEYSTORE_FILE }} -storepass ${{ env.KEYSTORE_PASSWORD }} -alias ${{ env.KEY_ALIAS }} -rfc 2>/dev/null | head -5 || echo "⚠️ Keystore verification issue"

      - name: Install npm dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Remove API routes (incompatible with static export)
        run: |
          rm -rf src/app/api/admin src/app/api/auth src/app/api/notifications \
            src/app/api/products src/app/api/seed src/app/api/seed-banners \
            src/app/api/send-push src/app/api/transactions src/app/api/transfer \
            src/app/api/user src/app/api/__tests__ src/app/api/route.ts || true

      - name: Build Next.js static export
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          NEXT_TELEMETRY_DISABLED: 1
          DATABASE_URL: "file::memory:"

      - name: Verify static export
        run: |
          echo "Checking out/ directory..."
          ls -la out/ | head -20
          echo "Total files in out/:"
          find out/ -type f | wc -l

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Verify Capacitor sync
        run: |
          echo "Checking android/app/src/main/assets/public/..."
          ls -la android/app/src/main/assets/public/ 2>/dev/null | head -10 || echo "⚠️ Public assets not found"
          echo "Checking google-services.json..."
          ls -la android/app/google-services.json 2>/dev/null || echo "⚠️ google-services.json not found"

      - name: Build Release APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -PMYAPP_UPLOAD_STORE_FILE=../../${{ env.KEYSTORE_FILE }} \
            -PMYAPP_UPLOAD_STORE_PASSWORD=${{ env.KEYSTORE_PASSWORD }} \
            -PMYAPP_UPLOAD_KEY_ALIAS=${{ env.KEY_ALIAS }} \
            -PMYAPP_UPLOAD_KEY_PASSWORD=${{ env.KEY_PASSWORD }} \
            --stacktrace

      - name: Verify APK signing
        run: |
          APK_PATH="android/app/build/outputs/apk/release/app-release.apk"
          echo "APK file info:"
          ls -la "$APK_PATH"
          echo ""
          echo "APK signing certificate:"
          $ANDROID_HOME/build-tools/${{ env.ANDROID_BUILD_TOOLS }}/apksigner verify --print-certs "$APK_PATH" 2>&1 || true

      - name: Extract SHA fingerprints
        id: sha-user
        run: |
          echo "╔══════════════════════════════════════════════╗"
          echo "║  USER WALLET - SHA FINGERPRINTS              ║"
          echo "║  Package: com.qtbm.south                     ║"
          echo "╚══════════════════════════════════════════════╝"
          echo ""
          echo "--- Release Keystore (south-wallet.keystore) ---"
          keytool -list -v -keystore ${{ env.KEYSTORE_FILE }} -storepass ${{ env.KEYSTORE_PASSWORD }} -alias ${{ env.KEY_ALIAS }} 2>&1 | grep -E "SHA1:|SHA256:" || true
          echo ""
          echo "--- APK Signing Certificate ---"
          $ANDROID_HOME/build-tools/${{ env.ANDROID_BUILD_TOOLS }}/apksigner verify --print-certs android/app/build/outputs/apk/release/app-release.apk 2>&1 || true
          echo ""
          # Extract SHA values for summary
          SHA1=$(keytool -list -v -keystore ${{ env.KEYSTORE_FILE }} -storepass ${{ env.KEYSTORE_PASSWORD }} -alias ${{ env.KEY_ALIAS }} 2>&1 | grep "SHA1:" | head -1 | awk '{print $2}')
          SHA256=$(keytool -list -v -keystore ${{ env.KEYSTORE_FILE }} -storepass ${{ env.KEYSTORE_PASSWORD }} -alias ${{ env.KEY_ALIAS }} 2>&1 | grep "SHA256:" | head -1 | awk '{print $2}')
          echo "sha1=$SHA1" >> $GITHUB_OUTPUT
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          echo "User App SHA-1: $SHA1"
          echo "User App SHA-256: $SHA256"

      - name: Upload User Wallet Release APK
        uses: actions/upload-artifact@v4
        with:
          name: south-wallet-user-release
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

  # ──────────────────────────────────────────────────────────────
  #  ADMIN APP (com.qtbm.south.admin)
  # ──────────────────────────────────────────────────────────────
  build-admin-app:
    name: "🛡️ Build Admin App (com.qtbm.south.admin)"
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.build_type == 'all' || github.event.inputs.build_type == 'admin' || github.event_name != 'workflow_dispatch' }}
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
